<h1 class="font-display-hero text-headline-lg-mobile md:text-display-hero text-primary tracking-tighter">

<p class="font-body-lg text-body-lg text-on-surface-variant max-w-lg">

            </p>
</header>
<!-- Selector Cards -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter w-full">
<!-- Parent Card -->
<button class="group relative bg-[#002366]/40 backdrop-blur-md rounded-xl border border-primary/20 hover:border-primary/50 transition-all duration-300 p-stack-md flex flex-col items-center text-center overflow-hidden hover:shadow-[0_0_30px_rgba(212,175,55,0.15)] text-left outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface">

<div class="z-10 flex flex-col items-center gap-stack-sm w-full">
<div class="w-20 h-20 rounded-full bg-surface-container-highest flex items-center justify-center mb-base border border-outline-variant/30 group-hover:scale-110 transition-transform duration-300">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">
                            family_restroom
                        </span>
</div>
<h2 class="font-headline-lg text-headline-lg text-on-surface">
                        Entrar como Padre
                    </h2>
<p class="font-body-md text-body-md text-on-surface-variant">

                    </p>
<div class="mt-base bg-surface-container-lowest px-4 py-2 rounded-full border border-outline-variant/30 group-hover:bg-primary-container group-hover:text-on-primary-container transition-colors duration-300">
<span class="font-label-caps text-label-caps">Acceder</span>
</div>
</div>
</button>
